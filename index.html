<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Majorat Patricia Dragomir 👑</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --acc:#1a6fd4;--acc2:#3d9bff;--acc3:#7ec8ff;
  --gold:#c9a84c;--gold2:#f0d080;
  --text:#e8f4ff;--muted:rgba(232,244,255,0.45);
}
html,body{height:100%;background:#010a17;font-family:'DM Sans',sans-serif;color:var(--text);overflow:hidden}

@keyframes rise{from{transform:translateY(60px) scale(0.97);opacity:0}to{transform:translateY(0) scale(1);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
@keyframes shimmer{0%{background-position:200% center}100%{background-position:-200% center}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes confettiDrop{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(61,155,255,0.2)}50%{box-shadow:0 0 50px rgba(61,155,255,0.5),0 0 80px rgba(201,168,76,0.12)}}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}

.screen{display:none;position:fixed;inset:0;flex-direction:column;align-items:center;justify-content:center}
.screen.on{display:flex}
.screen.anim{animation:rise 0.85s cubic-bezier(0.16,1,0.3,1) both}

#s-start{background:#010a17}
#bg-canvas{position:absolute;inset:0;z-index:0}

.start-center{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:2rem;text-align:center}
.emblem{width:116px;height:116px;border-radius:50%;background:linear-gradient(135deg,#041429,#061d3a);border:1px solid rgba(61,155,255,0.3);display:flex;align-items:center;justify-content:center;position:relative;animation:float 4s ease-in-out infinite}
.emblem::before{content:'';position:absolute;inset:-3px;border-radius:50%;background:conic-gradient(from 0deg,transparent 55%,var(--acc2) 70%,var(--gold) 78%,transparent 88%);animation:spin 5s linear infinite}
.emblem::after{content:'';position:absolute;inset:2px;border-radius:50%;background:linear-gradient(135deg,#041429,#061d3a)}
.emblem-inner{position:relative;z-index:1;font-size:3.2rem;filter:drop-shadow(0 0 14px rgba(61,155,255,0.7))}
.start-subtitle{font-family:'Cormorant Garamond',serif;font-size:.78rem;letter-spacing:.38em;color:var(--muted);text-transform:uppercase}
.start-btn{background:linear-gradient(135deg,var(--acc) 0%,var(--acc2) 50%,#5bb0ff 100%);background-size:200% auto;color:white;border:none;padding:1.05rem 3rem;border-radius:50px;font-size:1rem;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;letter-spacing:.1em;animation:shimmer 3s linear infinite;box-shadow:0 0 40px rgba(26,111,212,0.55);transition:transform .2s,box-shadow .2s}
.start-btn:hover{transform:scale(1.04);box-shadow:0 0 60px rgba(61,155,255,0.8)}

#s-card{background:#010a17;padding:0;align-items:center;justify-content:center;overflow-y:auto}
.card-shell{width:100%;max-width:420px;max-height:100vh;display:flex;flex-direction:column;position:relative;border-radius:28px;overflow:hidden;animation:glow 4s ease-in-out infinite;margin:auto}
.photo-zone{width:100%;flex:1;position:relative;min-height:0}
.photo-zone img{width:100%;height:100%;object-fit:cover;object-position:center top;display:block}
.photo-zone::after{content:'';position:absolute;bottom:0;left:0;right:0;height:38%;background:linear-gradient(to bottom,transparent,rgba(1,10,23,1));pointer-events:none}
.bottom-panel{width:100%;background:rgba(1,10,23,0.98);padding:1.1rem 1.4rem 1.5rem;position:relative;flex-shrink:0}
.bottom-panel::before{content:'';position:absolute;top:0;left:8%;right:8%;height:1px;background:linear-gradient(90deg,transparent,rgba(61,155,255,0.45),rgba(201,168,76,0.35),rgba(61,155,255,0.45),transparent)}
.confirm-label{text-align:center;font-size:.62rem;letter-spacing:.32em;color:var(--muted);text-transform:uppercase;margin-bottom:.85rem}
.liquid-input{width:100%;padding:.78rem 1.2rem;background:rgba(255,255,255,0.06);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.18);border-radius:50px;color:white;font-size:.9rem;font-family:'DM Sans',sans-serif;text-align:center;outline:none;transition:border-color .25s,background .25s,box-shadow .25s;margin-bottom:.85rem}
.liquid-input::placeholder{color:rgba(255,255,255,0.3)}
.liquid-input:focus{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.38);box-shadow:0 0 0 3px rgba(61,155,255,0.12)}
.liquid-btns{display:flex;gap:.7rem;width:100%}
.lg-yes,.lg-no{flex:1;padding:.85rem .5rem;border-radius:50px;border:none;font-size:.9rem;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;letter-spacing:.04em;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);transition:transform .15s,box-shadow .2s,background .2s}
.lg-yes{background:rgba(61,155,255,0.18);border:1px solid rgba(61,155,255,0.45);color:#a8d8ff;box-shadow:inset 0 1px 0 rgba(255,255,255,0.15),0 4px 20px rgba(26,111,212,0.25)}
.lg-yes:hover{background:rgba(61,155,255,0.28);border-color:rgba(61,155,255,0.7);box-shadow:inset 0 1px 0 rgba(255,255,255,0.2),0 6px 28px rgba(26,111,212,0.4);transform:scale(1.02)}
.lg-no{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.18);color:rgba(232,244,255,0.45);box-shadow:inset 0 1px 0 rgba(255,255,255,0.08)}
.lg-no:hover{background:rgba(255,255,255,0.11);border-color:rgba(255,255,255,0.3);color:rgba(232,244,255,0.75);transform:scale(1.02)}
.lg-yes:disabled,.lg-no:disabled{opacity:.35;cursor:default;transform:none}
.toast-box{padding:.75rem 1rem;border-radius:20px;font-size:.84rem;text-align:center;display:none;animation:fadeIn .4s ease;line-height:1.5;margin-top:.75rem;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.toast-box.yes{background:rgba(61,155,255,0.14);color:#7ec8ff;border:1px solid rgba(61,155,255,0.3)}
.toast-box.no{background:rgba(255,255,255,0.05);color:rgba(232,244,255,0.4);border:1px solid rgba(255,255,255,0.1)}
.admin-hint{text-align:center;font-size:.65rem;letter-spacing:.15em;color:rgba(232,244,255,0.12);margin-top:.65rem;cursor:pointer;transition:color .2s}
.admin-hint:hover{color:rgba(232,244,255,0.38)}

#s-pass,#s-admin{background:#010a17;padding:2rem 1rem;overflow-y:auto}
.glass-card{background:rgba(8,22,48,0.95);backdrop-filter:blur(20px);border:1px solid rgba(61,155,255,0.2);border-radius:24px;padding:2rem 1.8rem;width:100%;max-width:420px;position:relative;overflow:hidden}
.glass-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--acc2),var(--gold),var(--acc2),transparent)}
.admin-title{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:600;color:var(--gold2);margin-bottom:.2rem;text-align:center}
.admin-sub{font-size:.68rem;letter-spacing:.25em;color:var(--muted);text-transform:uppercase;text-align:center;margin-bottom:1.2rem}
.admin-count{display:inline-flex;align-items:center;gap:.4rem;background:rgba(26,111,212,0.14);border:1px solid rgba(61,155,255,0.18);border-radius:50px;padding:.28rem .85rem;font-size:.8rem;color:var(--acc3);margin-bottom:1rem}
.guest-row{display:flex;align-items:center;gap:.55rem;padding:.5rem .55rem;border-radius:9px;transition:background .15s;margin-bottom:.25rem}
.guest-row:hover{background:rgba(61,155,255,0.08)}
.guest-num{font-size:.72rem;color:var(--muted);min-width:1.3rem;text-align:right}
.guest-name-text{flex:1;font-size:.9rem;color:var(--text)}
.guest-ts{font-size:.68rem;color:var(--muted);white-space:nowrap}
.guest-edit-inp{flex:1;background:rgba(4,18,40,0.9);border:1px solid rgba(61,155,255,0.38);border-radius:7px;color:white;font-size:.85rem;font-family:'DM Sans',sans-serif;padding:.22rem .5rem;outline:none}
.edit-btn,.save-btn,.del-btn{background:none;border:none;cursor:pointer;font-size:.82rem;padding:.18rem .38rem;border-radius:5px;transition:background .15s;color:var(--muted)}
.edit-btn:hover{background:rgba(61,155,255,0.15);color:var(--acc3)}
.save-btn{color:#5bc87a}.save-btn:hover{background:rgba(91,200,122,0.15)}
.del-btn{color:rgba(232,100,100,0.55)}.del-btn:hover{background:rgba(232,100,100,0.12);color:#e87070}
.empty-state{text-align:center;color:var(--muted);font-size:.85rem;padding:1.8rem 0;font-style:italic}
.back-btn{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);color:rgba(232,244,255,0.45);padding:.55rem 1.4rem;border-radius:50px;font-size:.8rem;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .2s;margin-top:.8rem;letter-spacing:.06em}
.back-btn:hover{background:rgba(255,255,255,0.1);color:var(--text)}
.loading-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--acc3);margin:0 2px;animation:pulse 1.2s ease-in-out infinite}
.loading-dot:nth-child(2){animation-delay:.2s}
.loading-dot:nth-child(3){animation-delay:.4s}
.confetti-p{position:fixed;pointer-events:none;z-index:9999}
</style>
</head>

    <div class="start-subtitle">invitație exclusivă</div>
    <button class="start-btn" onclick="showScreen('s-card')">Deschide invitația ✦</button>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, onSnapshot, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAXFvp_AX583tPUHUxK0dRIO6qN9cvHoPg",
  authDomain: "patricia-majorat.firebaseapp.com",
  projectId: "patricia-majorat",
  storageBucket: "patricia-majorat.firebasestorage.app",
  messagingSenderId: "873175472909",
  appId: "1:873175472909:web:42d84b180f4339d32e6e44"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const guestsCol = collection(db, "guests");

const PASS = "patricia18";
let unsubscribe = null;

/* ── Animated background ── */
const canvas = document.getElementById("bg-canvas");
const ctx = canvas.getContext("2d");
let W, H, particles = [];
function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight}
resize(); window.addEventListener("resize",resize);
function rand(a,b){return a+Math.random()*(b-a)}
class P{
  constructor(){this.reset()}
  reset(){this.x=Math.random()*W;this.y=Math.random()*H;this.r=rand(0.5,2.8);this.vx=rand(-0.12,0.12);this.vy=rand(-0.28,-0.04);this.life=0;this.maxLife=rand(100,280);this.hue=rand(185,245);this.sat=rand(55,100)}
  step(){this.x+=this.vx;this.y+=this.vy;this.life++;if(this.life>this.maxLife||this.y<0)this.reset()}
  draw(){const a=Math.sin(this.life/this.maxLife*Math.PI)*0.85;ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.fillStyle=`hsla(${this.hue},${this.sat}%,75%,${a})`;ctx.fill()}
}
for(let i=0;i<130;i++) particles.push(new P());
function drawBg(){
  ctx.clearRect(0,0,W,H);
  const g=ctx.createRadialGradient(W*.5,H*.28,0,W*.5,H*.5,W*.85);
  g.addColorStop(0,"#051e42");g.addColorStop(.5,"#020e22");g.addColorStop(1,"#010810");
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  const g2=ctx.createRadialGradient(W*.15,H*.65,0,W*.15,H*.65,280);
  g2.addColorStop(0,"rgba(15,50,160,0.16)");g2.addColorStop(1,"transparent");
  ctx.fillStyle=g2;ctx.fillRect(0,0,W,H);
  particles.forEach(p=>{p.step();p.draw()});
}
(function loop(){requestAnimationFrame(loop);if(document.getElementById("s-start").classList.contains("on"))drawBg()})();

/* ── Navigation ── */
window.showScreen = function(id){
  document.querySelectorAll(".screen").forEach(s=>{s.classList.remove("on","anim")});
  const el=document.getElementById(id);
  el.classList.add("on");
  requestAnimationFrame(()=>el.classList.add("anim"));
  if(id==="s-admin") startAdminListener();
  else if(unsubscribe && id !== "s-admin"){stopAdminListener()}
  if(id==="s-pass"){
    document.getElementById("pass-inp").value="";
    document.getElementById("pass-err").textContent="";
  }
};

/* ── RSVP ── */
window.rsvp = async function(yes){
  const el=document.getElementById("gname");
  const name=el.value.trim();
  if(!name){
    el.style.borderColor="rgba(232,80,80,0.55)";
    el.placeholder="Scrie-ți numele mai întâi!";
    setTimeout(()=>{el.style.borderColor="";el.placeholder="Numele tău complet..."},2200);
    return;
  }
  const toast=document.getElementById("toast");
  const by=document.getElementById("byes");
  const bn=document.getElementById("bno");
  by.disabled=bn.disabled=true;

  if(yes){
    try{
      await addDoc(guestsCol,{name,accepted:true,timestamp:serverTimestamp()});
      toast.className="toast-box yes";
      toast.innerHTML=`✦ Minunat, <strong>${name}</strong>! Ne bucurăm enorm!`;
      confetti();
    } catch(e){
      toast.className="toast-box yes";
      toast.innerHTML="✦ Confirmat! Ne vedem la petrecere!";
    }
  } else {
    toast.className="toast-box no";
    toast.innerHTML=`Ne pare rău că nu poți veni, <strong>${name}</strong>...`;
  }
  toast.style.display="block";
  el.value="";
  setTimeout(()=>{by.disabled=bn.disabled=false;toast.style.display="none"},3500);
};

/* ── Admin auth ── */
window.checkPass = function(){
  if(document.getElementById("pass-inp").value===PASS){showScreen("s-admin")}
  else{
    const e=document.getElementById("pass-err");
    e.textContent="Parolă greșită. Mai încearcă!";
    setTimeout(()=>e.textContent="",2000);
  }
};

/* ── Admin live listener ── */
function startAdminListener(){
  if(unsubscribe) unsubscribe();
  const q=query(guestsCol,orderBy("timestamp","asc"));
  unsubscribe=onSnapshot(q,snap=>{
    const guests=snap.docs.map(d=>({id:d.id,...d.data()}));
    renderAdmin(guests);
  });
}
function stopAdminListener(){
  if(unsubscribe){unsubscribe();unsubscribe=null;}
}

function renderAdmin(guests){
  document.getElementById("adm-count").textContent=guests.length;
  const list=document.getElementById("adm-list");
  if(!guests.length){list.innerHTML='<div class="empty-state">Nimeni nu a confirmat încă...</div>';return}
  list.innerHTML=guests.map((g,i)=>
    `<div class="guest-row" id="row-${g.id}">
      <span class="guest-num">${i+1}.</span>
      <span class="guest-name-text">✦ ${g.name}</span>
      <button class="edit-btn" onclick="startEdit('${g.id}','${g.name.replace(/'/g,"\\'")}')">✎</button>
      <button class="del-btn" onclick="delGuest('${g.id}','${g.name.replace(/'/g,"\\'")}')">✕</button>
    </div>`
  ).join("");
}

window.startEdit = function(id, currentName){
  const row=document.getElementById("row-"+id);
  if(!row) return;
  row.innerHTML=`
    <span class="guest-num">#</span>
    <input class="guest-edit-inp" id="ei-${id}" value="${currentName}" onkeydown="if(event.key==='Enter')saveEdit('${id}')">
    <button class="save-btn" onclick="saveEdit('${id}')">✓</button>
    <button class="del-btn" onclick="cancelEdit('${id}','${currentName}')">✕</button>
  `;
  document.getElementById("ei-"+id).focus();
};

window.saveEdit = async function(id){
  const inp=document.getElementById("ei-"+id);
  if(!inp) return;
  const newName=inp.value.trim();
  if(!newName) return;
  try{
    await updateDoc(doc(db,"guests",id),{name:newName});
  } catch(e){console.error(e)}
};

window.cancelEdit = function(id, name){
  const row=document.getElementById("row-"+id);
  if(!row) return;
  row.innerHTML=`
    <span class="guest-num">·</span>
    <span class="guest-name-text">✦ ${name}</span>
    <button class="edit-btn" onclick="startEdit('${id}','${name}')">✎</button>
    <button class="del-btn" onclick="delGuest('${id}','${name}')">✕</button>
  `;
};

window.delGuest = async function(id, name){
  if(!confirm("Ștergi " + name + "?")) return;
  try{
    await deleteDoc(doc(db,"guests",id));
  } catch(e){console.error(e)}
};

/* ── Confetti ── */
function confetti(){
  const cols=["#3d9bff","#7ec8ff","#c9a84c","#f0d080","#ffffff","#5bb0ff","#b0d8ff"];
  for(let i=0;i<90;i++){
    const p=document.createElement("div");
    p.className="confetti-p";
    const sz=5+Math.random()*9;
    p.style.cssText=`left:${Math.random()*100}vw;top:-15px;width:${sz}px;height:${sz}px;background:${cols[Math.floor(Math.random()*cols.length)]};border-radius:${Math.random()>.5?"50%":"3px"};animation:confettiDrop ${1.4+Math.random()*2.5}s ease-in ${Math.random()*.9}s forwards;transform:rotate(${Math.random()*360}deg)`;
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),5000);
  }
}
</script>
